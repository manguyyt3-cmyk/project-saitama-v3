<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffcc00">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Saitama">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Project Saitama</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <h1 class="logo">⚡ PROJECT<br><span>SAITAMA</span></h1>
    <button id="notifBtn" class="btn-notif" title="Enable reminders">🔔</button>
  </div>
  <nav class="nav">
    <button id="navSpin" class="nav-btn active" onclick="showScreen('spin')">SPIN</button>
    <button id="navWorkout" class="nav-btn" onclick="showScreen('workout')">TRAIN</button>
    <button id="navStats" class="nav-btn" onclick="showScreen('stats')">STATS</button>
  </nav>
</header>

<main>

  <!-- Spin Screen -->
  <section id="spinScreen" class="screen">
    <div class="spin-wrapper">
      <p class="spin-label">Spin the wheel to generate today's training</p>
      <div id="wheel" class="wheel">⚡</div>
      <button id="spinBtn" class="btn-spin">SPIN TO TRAIN</button>
      <div id="results" class="results"></div>
    </div>
  </section>

  <!-- Workout Screen -->
  <section id="workoutScreen" class="screen hidden">
    <h2 class="screen-title">TODAY'S TRAINING</h2>
    <div id="workoutList"></div>
  </section>

  <!-- Stats Screen -->
  <section id="statsScreen" class="screen hidden">
    <h2 class="screen-title">HERO STATS</h2>
    <div id="statsList"></div>
  </section>

</main>

<script src="app.js"></script>
</body>
</html>
